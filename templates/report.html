<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Analyzer – SafeLife AI</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>
.container { max-width: 900px; margin: auto; padding: 20px; }
.card { background: var(--navy-3); border-radius: 12px; padding: 24px; border: 1px solid var(--border); }
.title { font-size: 20px; font-weight: 700; color: var(--text-1); margin-bottom: 10px; }
.desc { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }

.upload-box {
  border: 2px dashed var(--border);
  padding: 30px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}
.upload-box:hover { border-color: var(--cyan); }

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: var(--grad-cyan);
  border: none;
  border-radius: 8px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(0,255,136,0.05);
  border: 1px solid var(--green);
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">🧾 Smart Report Explainer</div>
    <div class="desc">Upload your medical report and get simple explanations</div>

    <div class="upload-box" onclick="document.getElementById('file').click()">
      📂 Click to Upload Report (PDF/Image)
      <input type="file" id="file" hidden>
    </div>

    <button onclick="analyzeReport()">Analyze Report</button>

    <div class="result" id="result">
      <strong>Analysis Result:</strong>
      <p id="output"></p>
    </div>

  </div>

</div>

<script>
function analyzeReport() {
  // Dummy output (later connect to backend)
  const text = `
  ✔ Hemoglobin is LOW  
  👉 Eat spinach, dates, iron-rich foods  

  ✔ Sugar level is NORMAL  
  ✔ Cholesterol slightly HIGH  
  👉 Avoid oily food
  `;

  document.getElementById('result').style.display = 'block';
  document.getElementById('output').innerText = text;
}
</script>

</body>
</html>
