
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login – SafeLife AI</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="loader"><div class="loader-heart">🫀</div><div class="loader-bar"><div class="loader-fill"></div></div><div class="loader-text">SafeLife AI Loading...</div></div>
<div id="particles"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand-logo">
      <div class="brand-pulse">🫀</div>
      <div class="brand-name">SAFELIFE AI</div>
      <div class="brand-sub">Health Intelligence System</div>
    </div>
    <h2 class="auth-title">Sign In</h2>
    {% if error %}<div class="alert-err">⚠️ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="your@email.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn btn-primary">🔐 Access System</button>
    </form>
    <div class="auth-link">No account? <a href="/register">Create one free</a></div>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
